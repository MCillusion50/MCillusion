            --sidebar-width: 250px;

            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);

        body.dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --sidebar-bg: #0f172a;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(30, 41, 59, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--text-white);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;

            overflow-y: auto;
            transition: transform 0.3s;
            scrollbar-width: thin;
            scrollbar-color: #3a3d45 transparent;

        }

        .sidebar-logo {

            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-logo .icon {

            height: 38px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 0;
        }

        .sidebar-nav .cat-label {
            padding: 14px 20px 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6b7280;
            font-weight: 600;
        }

        .sidebar-nav .cat-item {

            align-items: center;
            gap: 10px;
            padding: 11px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #b0b8c4;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            font-weight: 500;
        }

        .sidebar-nav .cat-item:hover {
            background: #252830;
            color: #fff;
            border-left-color: var(--primary);
        }
        .sidebar-nav .cat-item.active {
            background: #252830;
            color: #fff;
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid #2a2d35;
            font-size: 0.75rem;
            color: #6b7280;
            text-align: center;
            flex-shrink: 0;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;

        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            position: sticky;
            top: 0;
            z-index: 50;

            gap: 16px;
            height: var(--topbar-height);

            transition: background 0.3s;
        }

        .search-wrapper {

            max-width: 600px;
            position: relative;

            padding: 11px 18px 11px 44px;

            border-radius: 50px;
            font-size: 0.95rem;
            background: var(--bg);
            transition: all 0.2s;
            outline: none;
            color: var(--text);

            border-color: var(--primary);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.08);

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .search-hint {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            margin-top: 6px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 200;
            border: 1px solid var(--border);
        }

        .search-hint.show {
            display: block;
        }

            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;

        .search-hint .hint-item:hover {
            background: var(--bg);
            color: var(--primary);
        }

        .topbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;

        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--glass-shadow);
            color: var(--text);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .glass-btn:hover::before {
            opacity: 1;
            animation: glassShine 1.5s ease-in-out;
        }

        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
        }

        @keyframes glassShine {
            0% {
                left: -50%;
            }
            100% {

            }

        .content-area {

        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-section {
            background: var(--card-bg);
            border-radius: var(--radius);

        .tool-card .tool-name {

        }

            gap: 10px;
        }

        .tool-detail .subtitle {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        textarea,

            width: 100%;
            padding: 12px 16px;

            transition: 0.2s;
            background: var(--bg);

            background: var(--card-bg);

        .btn {

            color: var(--text);

        }

        .btn::before {
            content: '';

            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .btn:hover::before {
            opacity: 1;
            animation: glassShine 1.5s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.3);
        }

        .btn-primary {

            border: 1px solid rgba(255, 255, 255, 0.3);

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
        }

        .btn-group {

            gap: 10px;
            flex-wrap: wrap;
            margin: 14px 0;
        }

        .result-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-top: 14px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .file-drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg);
            margin: 10px 0;
        }

        .file-drop-zone:hover,

            background: var(--card-bg);

        .stats-row {

            gap: 16px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .stat-item {
            background: var(--bg);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            border: 1px solid var(--border);

        .color-preview {
            display: inline-block;

            height: 28px;

            border: 2px solid #ddd;
            vertical-align: middle;
            margin: 0 6px;

        .emoji-grid {
            display: grid;

            gap: 6px;
            font-size: 1.6rem;
            text-align: center;
        }

        .emoji-grid span {
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .emoji-grid span:hover {
            background: var(--bg);
        }

        .welcome-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .welcome-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
            overflow: hidden;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleFloat 2s ease-out forwards;
        }

        @keyframes sparkleFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .welcome-card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--text);
        }

        .welcome-card p {
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .copy-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid var(--glass-border);
        }

        .copy-toast.show {
            opacity: 1;
        }

        .mobile-menu-btn {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: var(--text);
            box-shadow: var(--glass-shadow);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .sidebar-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .mobile-menu-btn {
                display: flex;
            }
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 8px;
            }
            .content-area {
                padding: 16px 12px;
            }
            .tool-card {
                padding: 14px 8px;
            }
            .tool-card .tool-icon {
                font-size: 1.8rem;
            }
            .tool-card .tool-name {
                font-size: 0.75rem;
            }
            .topbar {
                padding: 10px 14px;
                gap: 8px;
            }
            .category-section {
                padding: 14px 16px;
                margin-bottom: 16px;
            }
            .tool-detail {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .tool-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .tool-card {
                padding: 10px 6px;
            }
            .tool-card .tool-icon {
                font-size: 1.5rem;
            }
            .tool-card .tool-name {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

        // ==================== 粒子背景 ====================
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function resize() { w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() { this.x = Math.random() * w;
                    this.y = -10;
                    this.size = Math.random() * 2 + 1;
                    this.speed = Math.random() * 1.5 + 0.5;
                    this.opacity = Math.random() * 0.5 + 0.2; }
                update() { this.y += this.speed; if (this.y > h + 10) { this.y = -10;
                        this.x = Math.random() * w; } }
                draw() { ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(79,110,247,${this.opacity})`;
                    ctx.fill(); }
            }
            for (let i = 0; i < 80; i++) particles.push(new Particle());

            function animate() { ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animate); }
            animate();
        })();

                build() {
                    return `
                <h2>✂️ 图片裁剪</h2>
                <input type="file" id="cropFile" accept="image/*">
                <canvas id="cropCanvas" style="max-width:100%;cursor:crosshair;border:2px dashed var(--border);display:block;"></canvas>
                <div class="btn-group"><button class="btn btn-sm" id="cropApply" disabled>裁剪并下载</button><button class="btn btn-sm btn-outline" id="cropReset" disabled>重置选区</button></div>`;
                },
                init(container) {
                    let img, rect, isDrawing = false,
                        startX, startY;
                    const canvas = container.querySelector('#cropCanvas');
                    const ctx = canvas.getContext('2d');
                    container.querySelector('#cropFile').onchange = () => {
                        const f = container.querySelector('#cropFile').files[0];
                        if (!f) return;
                        const r = new FileReader();
                        r.onload = function(e) { img = new Image();
                            img.onload = () => { const maxW = 700,
                                    ratio = maxW / img.width;
                                canvas.width = maxW;
                                canvas.height = img.height * ratio;
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
                            img.src = e.target.result; };
                        r.readAsDataURL(f);
                    };
                    canvas.onmousedown = e => { if (!img) return;
                        isDrawing = true;
                        const r = canvas.getBoundingClientRect();
                        startX = e.clientX - r.left;
                        startY = e.clientY - r.top;
                        rect = null; };
                    canvas.onmousemove = e => { if (!isDrawing || !img) return;
                        const r = canvas.getBoundingClientRect();
                        const x = e.clientX - r.left,
                            y = e.clientY - r.top;
                        rect = { x: Math.min(startX, x), y: Math.min(startY, y), w: Math.abs(x - startX), h: Math.abs(y -
                                startY) };
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        ctx.strokeStyle = '#4f6ef7';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h); };
                    canvas.onmouseup = () => { isDrawing = false; if (rect && rect.w > 10 && rect.h > 10) { container
                                .querySelector('#cropApply').disabled = false;
                            container.querySelector('#cropReset').disabled = false; } };
                    container.querySelector('#cropApply').onclick = () => { if (!rect || !img) return;
                        const sx = img.width / canvas.width,
                            sy = img.height / canvas.height;
                        const out = document.createElement('canvas');
                        out.width = rect.w * sx;
                        out.height = rect.h * sy;
                        out.getContext('2d').drawImage(img, rect.x * sx, rect.y * sy, rect.w * sx, rect.h * sy, 0, 0, out
                            .width, out.height);
                        out.toBlob(blob => { const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'cropped.png';
                            a.click(); }); };
                    container.querySelector('#cropReset').onclick = () => { rect = null;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        container.querySelector('#cropApply').disabled = true;
                        container.querySelector('#cropReset').disabled = true; };
                }
            },

                <button class="btn btn-sm" id="wmApply">添加水印并下载</button></div>`;

                    container.querySelector('#wmFile').onchange = () => { const f = container.querySelector('#wmFile')
                            .files[0]; if (!f) return;
                        const r = new FileReader();
                        r.onload = function(e) { img = new Image();
                            img.onload = () => draw();
                            img.src = e.target.result; };
                        r.readAsDataURL(f); };

                    function draw() { if (!img) return;
                        const maxW = 600,
                            ratio = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * ratio;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const text = container.querySelector('#wmText').value;
                        const fs = parseInt(container.querySelector('#wmFs').value);
                        const op = parseInt(container.querySelector('#wmOp').value) / 100;
                        const color = container.querySelector('#wmColor').value;
                        const pos = container.querySelector('#wmPos').value;
                        ctx.font = `bold ${fs}px "PingFang SC",sans-serif`;
                        ctx.fillStyle = color;
                        ctx.globalAlpha = op;
                        const tw = ctx.measureText(text).width;
                        let x, y;
                        const pad = 20; if (pos === 'center') { x = (canvas.width - tw) / 2;
                            y = canvas.height / 2 + fs / 3; } else if (pos === 'br') { x = canvas.width - tw -
                            pad;

                            y = canvas.height - pad; } else if (pos === 'tr') { x = canvas.width - tw - pad;
                            y = fs + pad; } else { x = pad;
                            y = fs + pad; }
                        ctx.fillText(text, x, y);
                        ctx.globalAlpha = 1; }
                    ['wmText', 'wmFs', 'wmOp', 'wmColor', 'wmPos'].forEach(id => { container.querySelector('#' + id)
                            .oninput = draw;

                            a.download = 'meme.png';
                            a.click(); }); };
                }
            }
        };

        // ==================== 导航系统 ====================
        function navigateTo(pageId, el) {
            document.querySelectorAll('.sidebar-nav .cat-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (pageId === 'home') { document.getElementById('page-home').classList.add('active');
                renderHome();
                closeSidebar();
                history.replaceState(null, '', '#'); return; }
            let target = document.getElementById('page-' + pageId); if (!target) { target = document.createElement('div');
                target.className = 'page';
                target.id = 'page-' + pageId;
                document.getElementById('contentArea').appendChild(target); }
            target.classList.add('active');
            const cfg = TOOLS[pageId]; if (cfg) { target.innerHTML = '<div class="tool-detail"></div>';
                const d = target.querySelector('.tool-detail');
                d.innerHTML = cfg.build();
                cfg.init(d); } else target.innerHTML = '<div class="tool-detail"><h2>🔧 开发中</h2></div>';
            document.getElementById('contentArea').scrollTop = 0;
            closeSidebar();
            history.replaceState(null, '', '#' + pageId);
        }

        function renderHome() {
            const home = document.getElementById('page-home');
            const cats = { '文件处理': 'cat-file', '图片处理': 'cat-image', '文本文案': 'cat-text', '实用工具': 'cat-util',
                '自媒体': 'cat-media' };
            home.innerHTML = Object.entries(cats).map(([n, id]) =>
                `<div class="category-section"><div class="category-title">${n}</div><div class="tool-grid" id="${id}"></div></div>`
                ).join('');
            Object.entries(TOOLS).forEach(([tid, cfg]) => { const grid = document.getElementById(cats[cfg.cat]); if (!grid)
                    return;
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => navigateTo(tid);
                card.innerHTML =
                    `<span class="tool-icon">${cfg.icon}</span><span class="tool-name">${cfg.name}</span>`;
                grid.appendChild(card); });
        }

        function handleSearch(q) {
            const hint = document.getElementById('searchHint'); if (!q.trim()) { hint.classList.remove('show'); return; }
            const r = Object.entries(TOOLS).filter(([, c]) => c.name.includes(q) || c.keywords.includes(q));
            hint.innerHTML = r.length ? r.map(([id, c]) =>
                `<div class="hint-item" onmousedown="navigateTo('${id}');document.getElementById('searchHint').classList.remove('show')">${c.icon} ${c.name}</div>`
                ).join('') : '<div class="hint-item">未找到</div>';
            hint.classList.add('show');
        }

        function init() { renderHome();
            const hash = location.hash.replace('#', ''); if (hash && TOOLS[hash]) navigateTo(hash); }
        window.addEventListener('hashchange', () => { const h = location.hash.replace('#', '');
            if (h && TOOLS[h]) navigateTo(h); });
        document.addEventListener('DOMContentLoaded', init);
        console.log('✅ 万能工具箱已就绪 | 5大分区 22个工具 | 液态玻璃UI');
    </script>
</body>
</html>
